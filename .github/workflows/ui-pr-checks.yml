name: UI PR Checks

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint

  pr-agent:
    name: PR Agent Review
    needs: lint
    uses: Omkraft/.github/.github/workflows/pr-agent-review.yml@main
    secrets:
      OPENAI_KEY: ${{ secrets.OPENAI_KEY }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: pr-agent

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
