name: UI PR Checks

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint

  ollama-review:
    name: Ollama Review
    needs: lint
    uses: Omkraft/.github/.github/workflows/ollama-review.yml@main

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: ollama-review

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

