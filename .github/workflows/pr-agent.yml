name: PR Agent

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  pr-agent:
    name: PR Agent Review
    uses: Omkraft/.github/.github/workflows/pr-agent-review.yml@main
    secrets:
      OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
