[github_action_config]
auto_review = true
pr_actions = ["opened", "reopened", "ready_for_review", "synchronize"]

[config]
publish_output = true
publish_output_progress = false
temperature = 0.1

[pr_reviewer]
require_score_review = true
require_tests_review = true
require_security_review = true
require_estimate_effort_to_review = true
require_can_be_split_review = true
require_focused_review = true
persistent_comment = true
enable_help_text = false
review_simple_changes = false
extra_instructions = """\
Review as a strict senior engineer. Prioritize correctness, behavioral regressions,
data integrity, API contract drift, auth and permission issues, performance risks,
accessibility regressions, and missing or weak tests. Prefer concrete findings tied
to changed files. Do not pad the review with praise or summaries when no issue exists.
"""
